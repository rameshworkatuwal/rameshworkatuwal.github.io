<style>
.photo-coming-soon {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 52vh;
  text-align: center;
  padding: 3rem 1.5rem;
}

.photo-icon {
  width: 72px;
  height: 72px;
  background: rgba(2,136,209,0.08);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1.8rem;
  border: 1.5px solid rgba(2,136,209,0.18);
}

.photo-icon svg {
  width: 34px;
  height: 34px;
  color: var(--blue);
  fill: var(--blue);
}

.photo-coming-soon h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  color: var(--text);
  margin-bottom: 0.7rem;
}

.photo-coming-soon p {
  color: var(--muted);
  font-size: 0.9rem;
  line-height: 1.75;
  max-width: 480px;
}

.photo-categories {
  display: flex;
  gap: 0.7rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 2rem;
}

.photo-tag {
  background: rgba(2,136,209,0.07);
  border: 1px solid rgba(2,136,209,0.15);
  color: var(--blue);
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  padding: 0.4rem 0.9rem;
  border-radius: 20px;
}

/* ===== gallery ===== */
.gal-intro{ color:var(--muted); font-size:.95rem; max-width:620px; margin-bottom:2.4rem; }
.gal-set{ margin-bottom:3rem; }
.gal-set-head{ display:flex; align-items:baseline; gap:.9rem; flex-wrap:wrap; margin-bottom:1.4rem; }
.gal-set-head h3{ font-family:'Playfair Display',serif; font-weight:700; font-size:1.45rem; color:var(--text); }
.gal-set-head span{ font-size:.78rem; letter-spacing:.16em; text-transform:uppercase; color:var(--blue); }
.gal-empty{ color:var(--muted); font-size:.88rem; }
.gal-grid{ columns:3; column-gap:14px; }
@media (max-width:1000px){ .gal-grid{ columns:2; } }
@media (max-width:620px){ .gal-grid{ columns:1; } }
.gal-item{ position:relative; break-inside:avoid; margin:0 0 14px; border-radius:14px; overflow:hidden;
  border:1px solid var(--line); background:var(--surface); cursor:zoom-in; display:block;
  opacity:0; transform:translateY(30px) scale(.975); filter:blur(8px);
  transition:opacity .85s cubic-bezier(.2,.7,.2,1), transform .85s cubic-bezier(.2,.7,.2,1), filter .85s cubic-bezier(.2,.7,.2,1), border-color .4s, box-shadow .5s; }
.gal-item.in{ opacity:1; transform:none; filter:blur(0); }
.gal-item img{ width:100%; height:auto; display:block; min-height:160px; background:#0a0f1c;
  transition:transform .8s cubic-bezier(.2,.7,.2,1), filter .6s; filter:saturate(.95) contrast(1.02); }
.gal-item:hover{ border-color:rgba(56,225,255,.42); box-shadow:0 20px 46px rgba(0,0,0,.5); }
.gal-item:hover img{ transform:scale(1.05); filter:saturate(1.05) contrast(1.04); }

/* lightbox — always fits the screen */
.lb{ position:fixed; inset:0; z-index:9999; background:rgba(3,5,10,.94); backdrop-filter:blur(14px);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .35s; }
.lb.on{ opacity:1; pointer-events:auto; }
.lb-stage{ width:100%; height:100%; padding:4.5rem 4.5rem 3.5rem; display:flex;
  align-items:center; justify-content:center; box-sizing:border-box; }
.lb-stage img{ display:block; width:auto; height:auto;
  max-width:calc(100vw - 9rem); max-height:calc(100vh - 8rem); object-fit:contain;
  border-radius:10px; box-shadow:0 24px 70px rgba(0,0,0,.6);
  transform:scale(.96); transition:transform .4s cubic-bezier(.2,.7,.2,1); }
.lb.on .lb-stage img{ transform:scale(1); }
.lb-count{ position:absolute; bottom:1.1rem; left:0; right:0; text-align:center;
  color:var(--muted); font-family:'Space Grotesk',sans-serif; font-size:.8rem; letter-spacing:.08em; }
.lb-x,.lb-nav{ position:absolute; z-index:2; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.18);
  color:#eaf4fb; border-radius:50%; width:44px; height:44px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:1.2rem; transition:background .25s, transform .25s; }
.lb-x:hover,.lb-nav:hover{ background:rgba(56,225,255,.2); transform:scale(1.08); }
.lb-x{ top:1.2rem; right:1.2rem; }
.lb-prev{ left:1.2rem; top:50%; margin-top:-22px; }
.lb-next{ right:1.2rem; top:50%; margin-top:-22px; }
@media (max-width:620px){
  .lb-stage{ padding:4rem 1rem 3rem; }
  .lb-stage img{ max-width:calc(100vw - 2rem); max-height:calc(100vh - 7rem); }
  .lb-prev{left:.5rem} .lb-next{right:.5rem}
}
html[data-theme="light"] .gal-item{ background:#fff; box-shadow:0 10px 26px rgba(20,50,90,.08); }
html[data-theme="light"] .gal-item img{ background:#eef2f7; filter:saturate(1) contrast(1); }
html[data-theme="light"] .lb{ background:rgba(240,245,250,.96); }
html[data-theme="light"] .lb-x, html[data-theme="light"] .lb-nav{ background:rgba(255,255,255,.92); border-color:rgba(20,60,100,.15); color:#10202e; }

</style>
<script>(function(){try{if(localStorage.getItem('rk_theme')==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>

<script>
// Smooth page exit
document.querySelectorAll('.nav-links a').forEach(link => {
  link.addEventListener('click', function(e) {
    const href = this.getAttribute('href');
    if (href && !href.startsWith('#') && !href.startsWith('mailto') && !href.startsWith('tel')) {
      e.preventDefault();
      document.body.classList.add('page-exit');
      setTimeout(() => { window.location.href = href; }, 240);
    }
  });
});
</script>

<script>
(function(){
  var obs=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:0.08});
  document.querySelectorAll('.reveal,.reveal-stagger').forEach(function(el){obs.observe(el);});
})();
</script>
